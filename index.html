<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluentLoop AI</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #1e293b;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
max-width:70%;
padding:12px 16px;
border-radius:12px;
line-height:1.5;
}

.user{
align-self:flex-end;
background:#2563eb;
}

.ai{
align-self:flex-start;
background:#1e293b;
}

#inputArea{
display:flex;
padding:10px;
background:#020617;
border-top:1px solid #1e293b;
}

#input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
outline:none;
font-size:16px;
}

button{
margin-left:10px;
padding:12px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<header>
FluentLoop AI
</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>

const chat = document.getElementById("chat")

function addMessage(text,cls){
const div = document.createElement("div")
div.className = "message " + cls
div.innerText = text
chat.appendChild(div)
chat.scrollTop = chat.scrollHeight
}

async function sendMessage(){

const input = document.getElementById("input")
const text = input.value.trim()

if(!text) return

addMessage(text,"user")
input.value=""

try{

const res = await fetch("https://fluentloop-backend.onrender.com/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
})

const data = await res.json()

addMessage(data.reply || "No response","ai")

}catch(err){

addMessage("Server error","ai")

}

}

document.getElementById("input")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendMessage()
}

})

</script>

</body>
</html>
