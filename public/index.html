<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>FluentLoop</title>

<style>

body{
background:#0B1120;
font-family:Arial;
color:white;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:15px;
font-size:20px;
border-bottom:1px solid #1E293B;
}

#chat{
flex:1;
padding:20px;
overflow-y:auto;
}

.msg{
margin-bottom:15px;
padding:10px;
border-radius:8px;
max-width:70%;
}

.user{
background:#0AB7A6;
align-self:flex-end;
}

.ai{
background:#1E293B;
}

#inputBox{
display:flex;
border-top:1px solid #1E293B;
}

input{
flex:1;
padding:15px;
border:none;
outline:none;
background:#0B1120;
color:white;
}

button{
background:#0AB7A6;
border:none;
padding:15px;
cursor:pointer;
}

</style>

</head>

<body>

<header>FluentLoop</header>

<div id="chat"></div>

<div id="inputBox">
<input id="input" placeholder="Type a message...">
<button onclick="send()">Send</button>
</div>

<script src="app.js"></script>

</body>
</html>
